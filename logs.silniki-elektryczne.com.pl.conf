# /etc/nginx/conf.d/logs.silniki-elektryczne.com.pl.conf
server {
    listen 80;
    server_name logs.silniki-elektryczne.com.pl;

    # Ingest endpoint — no rate limit (Vector sends batches)
    location /ingest {
        proxy_pass http://127.0.0.1:4100;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Everything else — dashboard + API
    location / {
        proxy_pass http://127.0.0.1:4100;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Authorization $http_authorization;
    }
}
