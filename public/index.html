<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Logs</title>
    <link rel="stylesheet" href="/style.css" />
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📋</text></svg>"
    />
  </head>
  <body>
    <header>
      <div class="header-left">
        <h1>📋 Logs</h1>
        <span id="stats-badge" class="badge">loading...</span>
        <span id="errors-badge" class="badge badge-error" style="display: none"
          >0 errors/h</span
        >
        <span id="db-badge" class="badge badge-muted">0 MB</span>
      </div>
      <div class="header-right">
        <button onclick="toggleLive()" id="live-btn" class="btn btn-live">
          ▶ Live
        </button>
        <button onclick="resetAndFetch()" class="btn">Refresh</button>
      </div>
    </header>

    <div class="filters">
      <select id="f-host" onchange="resetAndFetch()">
        <option value="">All hosts</option>
      </select>
      <select id="f-app" onchange="resetAndFetch()">
        <option value="">All apps</option>
      </select>
      <select id="f-level" onchange="resetAndFetch()">
        <option value="">All levels</option>
        <option value="error">error</option>
        <option value="warn">warn</option>
        <option value="info">info</option>
        <option value="debug">debug</option>
      </select>
      <input
        type="text"
        id="f-search"
        placeholder="Search..."
        onkeyup="if (event.key === 'Enter') resetAndFetch();"
      />
      <button onclick="resetAndFetch()" class="btn btn-sm">Search</button>
    </div>

    <div id="log-container">
      <table id="log-table">
        <thead>
          <tr>
            <th class="col-ts">Time</th>
            <th class="col-host">Host</th>
            <th class="col-app">App</th>
            <th class="col-level">Level</th>
            <th class="col-msg">Message</th>
          </tr>
        </thead>
        <tbody id="log-body"></tbody>
      </table>
      <div id="scroll-sentinel"></div>
      <div
        id="loading-indicator"
        style="display: none; text-align: center; padding: 16px; color: #666680"
      >
        Loading...
      </div>
      <div
        id="end-indicator"
        style="
          display: none;
          text-align: center;
          padding: 16px;
          color: #444466;
          font-size: 11px;
        "
      >
        — End of logs —
      </div>
    </div>

    <script>
      const BATCH = 30;
      let cursor = null; // ID cursor for pagination
      let loading = false;
      let hasMore = true;
      let liveInterval = null;

      // Infinite scroll via IntersectionObserver
      const sentinel = document.getElementById("scroll-sentinel");
      const observer = new IntersectionObserver(
        (entries) => {
          if (entries[0].isIntersecting && !loading && hasMore) {
            fetchLogs();
          }
        },
        { root: document.getElementById("log-container"), rootMargin: "200px" },
      );
      observer.observe(sentinel);

      function resetAndFetch() {
        cursor = null;
        hasMore = true;
        document.getElementById("log-body").innerHTML = "";
        document.getElementById("end-indicator").style.display = "none";
        fetchLogs();
      }

      function getAuth() {
        return {};
      }

      async function fetchStats() {
        try {
          const res = await fetch("/api/stats");
          if (!res.ok) return;
          const data = await res.json();

          document.getElementById("stats-badge").textContent =
            `${data.total.toLocaleString()} logs`;

          const errBadge = document.getElementById("errors-badge");
          if (data.errors_last_hour > 0) {
            errBadge.style.display = "inline";
            errBadge.textContent = `${data.errors_last_hour} errors/h`;
          } else {
            errBadge.style.display = "none";
          }

          document.getElementById("db-badge").textContent =
            `${data.db_size_mb} MB`;

          const hostSelect = document.getElementById("f-host");
          const appSelect = document.getElementById("f-app");
          const currentHost = hostSelect.value;
          const currentApp = appSelect.value;

          hostSelect.innerHTML = '<option value="">All hosts</option>';
          data.hosts.forEach((h) => {
            hostSelect.innerHTML += `<option value="${h}" ${h === currentHost ? "selected" : ""}>${h}</option>`;
          });

          appSelect.innerHTML = '<option value="">All apps</option>';
          data.apps.forEach((a) => {
            appSelect.innerHTML += `<option value="${a}" ${a === currentApp ? "selected" : ""}>${a}</option>`;
          });
        } catch (e) {
          console.error("Stats error:", e);
        }
      }

      async function fetchLogs() {
        if (loading || !hasMore) return;
        loading = true;
        document.getElementById("loading-indicator").style.display = "block";

        const host = document.getElementById("f-host").value;
        const app = document.getElementById("f-app").value;
        const level = document.getElementById("f-level").value;
        const search = document.getElementById("f-search").value;

        const params = new URLSearchParams();
        params.set("limit", BATCH);
        if (cursor) params.set("before_id", cursor);
        if (host) params.set("host", host);
        if (app) params.set("app", app);
        if (level) params.set("level", level);
        if (search) params.set("search", search);

        try {
          const res = await fetch(`/api/logs?${params}`);
          if (!res.ok) return;
          const data = await res.json();

          appendLogs(data.logs);

          if (data.nextCursor) cursor = data.nextCursor;

          if (data.logs.length < BATCH || data.hasMore === false) {
            hasMore = false;
            document.getElementById("end-indicator").style.display = "block";
          }
        } catch (e) {
          console.error("Fetch error:", e);
        } finally {
          loading = false;
          document.getElementById("loading-indicator").style.display = "none";
        }
      }

      function firstLine(msg) {
        const lines = msg.split("\n");
        for (const line of lines) {
          const trimmed = line.trim();
          if (trimmed && !/^[{}\[\],;]+$/.test(trimmed)) return trimmed;
        }
        return lines[0] || "";
      }

      function appendLogs(logs) {
        const tbody = document.getElementById("log-body");
        const fragment = document.createDocumentFragment();

        logs.forEach((log) => {
          const levelClass = `level-${log.level}`;
          const ts = formatTime(log.ts);
          const lineCount = log.message.split("\n").length;
          const preview = escapeHtml(firstLine(log.message)).substring(0, 250);
          const full = escapeHtml(log.message);
          const isMulti = lineCount > 1;
          const badge = isMulti
            ? ` <span class="lines-badge">${lineCount} lines</span>`
            : "";
          const expandHint = isMulti
            ? ' <span class="expand-hint">▶ expand</span>'
            : "";

          const tr = document.createElement("tr");
          tr.className = `${levelClass} log-row${isMulti ? " multi" : ""}`;
          tr.onclick = function () {
            toggleRow(this);
          };
          tr.innerHTML = `
            <td class="col-ts" title="${log.ts}">${ts}</td>
            <td class="col-host">${log.host}</td>
            <td class="col-app">${log.app}</td>
            <td class="col-level"><span class="level-tag ${levelClass}">${log.level}</span>${badge}</td>
            <td class="col-msg">
              <pre class="msg-short">${preview}${expandHint}</pre>
              <pre class="msg-full" style="display:none">${full}</pre>
            </td>`;
          fragment.appendChild(tr);
        });

        tbody.appendChild(fragment);
      }

      function renderLogs(logs) {
        document.getElementById("log-body").innerHTML = "";
        appendLogs(logs);
      }

      function toggleRow(tr) {
        const short = tr.querySelector(".msg-short");
        const full = tr.querySelector(".msg-full");
        if (!full) return;
        const isExpanded = full.style.display !== "none";
        short.style.display = isExpanded ? "block" : "none";
        full.style.display = isExpanded ? "none" : "block";
        tr.classList.toggle("expanded", !isExpanded);
      }

      function formatTime(ts) {
        try {
          const d = new Date(ts);
          if (isNaN(d.getTime())) return ts.substring(0, 19);
          return d.toLocaleString("pl-PL", {
            month: "2-digit",
            day: "2-digit",
            hour: "2-digit",
            minute: "2-digit",
            second: "2-digit",
          });
        } catch {
          return ts.substring(0, 19);
        }
      }

      function escapeHtml(str) {
        return str
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;");
      }

      function toggleLive() {
        const btn = document.getElementById("live-btn");
        if (liveInterval) {
          clearInterval(liveInterval);
          liveInterval = null;
          btn.textContent = "▶ Live";
          btn.classList.remove("active");
        } else {
          liveInterval = setInterval(() => {
            resetAndFetch();
            fetchStats();
          }, 3000);
          btn.textContent = "⏸ Live";
          btn.classList.add("active");
        }
      }

      // Init
      fetchStats();
      fetchLogs();
      setInterval(fetchStats, 30000);
    </script>
  </body>
</html>
