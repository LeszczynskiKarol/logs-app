# /etc/vector/vector.yaml — Stojan (sends to local log server)
sources:
  pm2_logs:
    type: file
    include:
      - /home/ec2-user/.pm2/logs/*.log
    exclude:
      - /home/ec2-user/.pm2/logs/pm2-logrotate*.log

  nginx_access:
    type: file
    include:
      - /var/log/nginx/access.log

  nginx_error:
    type: file
    include:
      - /var/log/nginx/error.log

  syslog:
    type: file
    include:
      - /var/log/messages

sinks:
  local_logs:
    type: http
    inputs:
      - pm2_logs
      - nginx_access
      - nginx_error
      - syslog
    uri: http://127.0.0.1:4100/ingest
    method: post
    encoding:
      codec: json
    headers:
      x-api-key: "zmien-ten-klucz-2026"
    batch:
      max_bytes: 1048576
      timeout_secs: 5
